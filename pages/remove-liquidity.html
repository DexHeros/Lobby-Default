<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Liquidity | DexHero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="/dexhero-logo.png">
    <link rel="apple-touch-icon" href="/dexhero-logo.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../pages.css">
    <style>
        .utility-container {
            max-width: 520px;
            margin: 0 auto;
        }

        .utility-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
        }

        .utility-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .utility-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
        }

        .utility-icon svg {
            width: 32px;
            height: 32px;
            color: var(--danger);
        }

        .utility-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .utility-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .position-card {
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .position-card:hover {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.05);
        }

        .position-card.selected {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
        }

        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .position-name {
            font-size: 16px;
            font-weight: 600;
        }

        .position-badge {
            padding: 4px 8px;
            background: rgba(6, 182, 212, 0.2);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-cyan);
        }

        .position-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .slider-container {
            margin: 24px 0;
        }

        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-secondary);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-cyan);
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-cyan);
            cursor: pointer;
            border: none;
        }

        .percentage-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .percentage-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .percentage-btn:hover {
            border-color: var(--accent-cyan);
        }

        .percentage-btn.active {
            background: var(--accent-cyan);
            color: #000;
            border-color: var(--accent-cyan);
        }

        .info-box {
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }

        .info-row .label {
            color: var(--text-muted);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .utility-container {
                max-width: 100%;
                padding: 0 12px;
            }
            .utility-card {
                padding: 20px;
            }
            .percentage-buttons {
                flex-wrap: wrap;
            }
            .percentage-btn {
                flex: 1 1 40%;
            }
            .position-stats {
                grid-template-columns: 1fr;
            }
            .utility-header h1 {
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .utility-card {
                padding: 16px;
                border-radius: 14px;
            }
            .utility-header {
                margin-bottom: 20px;
            }
            .utility-header h1 {
                font-size: 18px;
            }
            .position-card {
                padding: 12px;
            }
            .percentage-btn {
                padding: 8px;
                font-size: 12px;
            }
            .info-box {
                padding: 12px;
            }
            .btn-submit {
                padding: 14px;
                font-size: 14px;
            }
            .empty-state {
                padding: 24px 16px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>

<body>
    <div id="header-placeholder"></div>
    <main class="main-content page-content">
        <div class="utility-container">
            <div class="utility-card">
                <div class="utility-header">
                    <div class="utility-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="8.5" cy="7" r="4" />
                            <line x1="23" y1="11" x2="17" y2="11" />
                        </svg>
                    </div>
                    <h1>Remove Liquidity</h1>
                    <p>Withdraw from your liquidity pools</p>
                </div>

                <div id="positions-container">
                    <div class="empty-state" id="empty-state">
                        <p>Connect wallet to view your LP positions</p>
                    </div>
                    <div id="positions-list" style="display: none;"></div>
                </div>

                <div id="withdrawal-section" style="display: none;">
                    <div class="slider-container">
                        <label>Withdrawal Amount</label>
                        <div class="percentage-buttons">
                            <button class="percentage-btn" onclick="setPercentage(25)">25%</button>
                            <button class="percentage-btn" onclick="setPercentage(50)">50%</button>
                            <button class="percentage-btn" onclick="setPercentage(75)">75%</button>
                            <button class="percentage-btn active" onclick="setPercentage(100)">100%</button>
                        </div>
                        <input type="range" id="withdrawal-slider" class="slider" min="0" max="100" value="100"
                            oninput="updateWithdrawalDisplay()">
                        <div style="text-align: center; margin-top: 12px; font-size: 24px; font-weight: 700;">
                            <span id="withdrawal-percentage">100</span>%
                        </div>
                    </div>

                    <div class="info-box">
                        <div class="info-row">
                            <span class="label">You will receive</span>
                            <span class="value"></span>
                        </div>
                        <div class="info-row">
                            <span class="label">ETH</span>
                            <span class="value" id="receive-sol">0 ETH</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Token</span>
                            <span class="value" id="receive-token">0 TOKEN</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Remaining LP</span>
                            <span class="value" id="remaining-lp">0 LP</span>
                        </div>
                    </div>

                    <button class="btn-submit" id="remove-btn" onclick="handleRemoveLiquidity()" disabled>
                        Connect Wallet
                    </button>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <div id="modals-placeholder"></div>
    <script src="../components/header.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../components/modals.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        let selectedPosition = null;
        let positions = [];

        async function loadUserPositions() {
            const walletAddress = sessionStorage.getItem('walletAddress');
            if (!walletAddress) return;

            document.getElementById('empty-state').innerHTML = '<p>Loading positions...</p>';

            try {
                const result = await window.DexHeroLiquidity.getUserLPPositions(walletAddress);

                if (result.success && result.positions.length > 0) {
                    positions = result.positions;
                    displayPositions(result.positions);
                } else {
                    document.getElementById('empty-state').innerHTML = '<p>No liquidity positions found.<br><a href="add-liquidity.html" style="color: var(--accent-cyan);">Add liquidity</a> to get started!</p>';
                    document.getElementById('empty-state').style.display = 'block';
                    document.getElementById('positions-list').style.display = 'none';
                }
            } catch (error) {
                console.error('Error loading positions:', error);
                document.getElementById('empty-state').innerHTML = '<p>Error loading positions</p>';
            }
        }

        function displayPositions(positions) {
            const container = document.getElementById('positions-list');
            container.innerHTML = '';

            positions.forEach((pos, idx) => {
                const card = document.createElement('div');
                card.className = 'position-card';
                card.onclick = () => selectPosition(idx);

                card.innerHTML = `
                    <div class="position-header">
                        <span class="position-name">${pos.token_name || 'Token'} / ETH</span>
                        <span class="position-badge">${pos.dex_name || 'uniswap'}</span>
                    </div>
                    <div class="position-stats">
                        <div>LP: ${parseFloat(pos.lp_amount || 0).toFixed(4)}</div>
                        <div>ETH: ${parseFloat(pos.sol_deposited || 0).toFixed(4)}</div>
                    </div>
                `;

                container.appendChild(card);
            });

            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('positions-list').style.display = 'block';
        }

        function selectPosition(index) {
            selectedPosition = positions[index];

            // Update UI
            document.querySelectorAll('.position-card').forEach((card, idx) => {
                card.classList.toggle('selected', idx === index);
            });

            // Show withdrawal section
            document.getElementById('withdrawal-section').style.display = 'block';
            document.getElementById('remove-btn').disabled = false;
            document.getElementById('remove-btn').textContent = 'Remove Liquidity';

            updateWithdrawalDisplay();
        }

        function setPercentage(percent) {
            document.getElementById('withdrawal-slider').value = percent;
            document.querySelectorAll('.percentage-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.textContent) === percent);
            });
            updateWithdrawalDisplay();
        }

        function updateWithdrawalDisplay() {
            if (!selectedPosition) return;

            const percentage = parseFloat(document.getElementById('withdrawal-slider').value);
            document.getElementById('withdrawal-percentage').textContent = percentage;

            const lpAmount = parseFloat(selectedPosition.lp_amount || 0);
            const solDeposited = parseFloat(selectedPosition.sol_deposited || 0);
            const tokenDeposited = parseFloat(selectedPosition.token_deposited || 0);

            const withdrawLP = (lpAmount * percentage) / 100;
            const receiveSol = (solDeposited * percentage) / 100;
            const receiveToken = (tokenDeposited * percentage) / 100;
            const remainingLP = lpAmount - withdrawLP;

            document.getElementById('receive-sol').textContent = receiveSol.toFixed(4) + ' ETH';
            document.getElementById('receive-token').textContent = receiveToken.toFixed(4) + ' ' + (selectedPosition.token_symbol || 'TOKEN');
            document.getElementById('remaining-lp').textContent = remainingLP.toFixed(4) + ' LP';
        }

        async function handleRemoveLiquidity() {
            if (!selectedPosition) {
                alert('Please select a position first');
                return;
            }

            const percentage = parseFloat(document.getElementById('withdrawal-slider').value);
            if (percentage <= 0) {
                alert('Please enter a valid withdrawal amount');
                return;
            }

            const confirmed = confirm(`Remove ${percentage}% of your liquidity?\n\nYou will receive:\n- ${document.getElementById('receive-sol').textContent}\n- ${document.getElementById('receive-token').textContent}`);
            if (!confirmed) return;

            const btn = document.getElementById('remove-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Removing liquidity...';

            try {
                const lpAmount = parseFloat(selectedPosition.lp_amount);
                const withdrawAmount = (lpAmount * percentage) / 100;

                const result = await window.DexHeroLiquidity.removeLiquidity({
                    poolAddress: selectedPosition.pool_address,
                    lpAmount: withdrawAmount,
                    slippage: 1
                });

                if (!result.success) throw new Error(result.error);

                // Update database
                btn.textContent = 'Updating database...';
                const newAmount = lpAmount - withdrawAmount;

                await window.DexHeroLiquidity.updateLPPosition(selectedPosition.position_id, {
                    lp_amount: newAmount,
                    is_active: newAmount > 0
                });

                btn.textContent = 'Success!';
                setTimeout(() => {
                    alert(`Liquidity removed successfully!\n\nReceived:\n- ${result.solReceived} ETH\n- ${result.tokenReceived} tokens\n\nTransaction: ${result.signature}\n\n${result.message || ''}`);
                    window.location.reload();
                }, 1000);
            } catch (error) {
                console.error('Remove liquidity failed:', error);
                alert(`Transaction failed: ${error.message}`);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        function checkWalletConnection() {
            const isConnected = sessionStorage.getItem('walletConnected') === 'true';
            const btn = document.getElementById('remove-btn');

            if (isConnected) {
                loadUserPositions();
            } else {
                btn.disabled = true;
                btn.textContent = 'Connect Wallet';
                btn.onclick = openConnectModal;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.DexHeroSupabase) window.DexHeroSupabase.init();
            checkWalletConnection();
            setInterval(checkWalletConnection, 2000);
        });
    </script>
</body>

</html>
