    <!-- Browser error sink (B3). Posts uncaught errors + unhandled
         rejections to /api/client-errors which forwards to Sentry
         server-side. No-ops on the server end when SENTRY_DSN is unset.
         Inline + small so a 500 on /js/error-reporter.js wouldn't itself
         break error reporting. Rate-limited client-side too (max 1
         event/sec/page) so a render-loop bug doesn't flood the sink. -->
    <script>
    (function () {
        var lastSent = 0;
        function ship(payload) {
            var now = Date.now();
            if (now - lastSent < 1000) return;  // 1 evt/sec/page
            lastSent = now;
            try {
                fetch('/api/client-errors', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify(payload),
                    keepalive: true,
                }).catch(function () {});
            } catch (e) { /* never throw from the reporter */ }
        }
        window.addEventListener('error', function (e) {
            ship({
                kind: 'error',
                message: e?.message || 'unknown error',
                stack: e?.error?.stack || '',
                url: location.href,
            });
        });
        window.addEventListener('unhandledrejection', function (e) {
            var r = e?.reason;
            ship({
                kind: 'unhandledrejection',
                message: (r && r.message) ? r.message : String(r).slice(0, 300),
                stack: (r && r.stack) ? r.stack : '',
                url: location.href,
            });
        });
    })();
    </script>

<body class="lobby-body">

    <!-- DexHero brand anchor (body). Verified at runtime by the platform
         before serving this fork; the data-version pin records the
         Lobby-Default release the fork was branched from. -->
    <div data-dexhero-anchor hidden data-version="lobby-default-v0.1.0"></div>

    <!-- Cycling lobby backdrop — direct child of <body> so it spans the full
         viewport (no clipping by .lobby-root's overflow / isolation context). -->

        <div class="lobby-bg__layer is-active" style="background-image:url('/assets/images/Bg1.png')"></div>

    </div>

    <div class="lobby-root" id="lobby-root">

        <!-- Ticker tape (HUD scroll) -->
        <div class="lobby-ticker" id="lobby-ticker" aria-hidden="true"></div>

        <!-- Top nav -->

            <div class="lobby-brand-wrap" id="lobby-brand-wrap">

                    <img src="/dexhero-logo.png" alt="">
                    <span>DEXHERO</span>
                </a>
                <div class="lobby-brand-pop" id="lobby-brand-pop" hidden></div>
            </div>
            <div class="lobby-tabs" id="lobby-tabs" role="tablist"></div>
            <div class="lobby-nav__end">
                <!-- Main · genesis quick-link — opens the main branch
                     view (promoted patches that comprise the platform's
                     default base, plus the genesis commit info and a
                     reset-my-branch-to-main affordance). Sits adjacent
                     to "Start here" so the two foundational entry
                     points read together: connect, then jump to main. -->
                <a class="lobby-connect lobby-connect--main" id="lobby-main-genesis" href="#/main" title="View the platform's Genetics feed" aria-label="View Genetics">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="6" cy="6" r="2.2"/>
                        <circle cx="6" cy="18" r="2.2"/>
                        <circle cx="18" cy="12" r="2.2"/>
                        <path d="M6 8.2v7.6"/>
                        <path d="M6 6h6a4 4 0 0 1 4 4v0a4 4 0 0 1-4 4H6"/>
                    </svg>
                    <span class="lobby-connect__label">Genetics</span>
                </a>

                <!-- Unified "Connections" button — opens a master-list
                     popover showing every platform the user can link to
                     their wallet. Replaces the old LLM + Steam chips +
                     link-icon CTAs that lived between them. Their hidden
                     buttons stay in markup below so existing JS hooks
                     (openConnectModal, dexhero:open-llm-connect, etc.)
                     still fire when rows in the master list invoke them. -->
                <div class="lobby-chip-wrap">
                    <button class="lobby-connect" id="lobby-connect" type="button" aria-label="Start here" aria-haspopup="true">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 17H7a5 5 0 0 1 0-10h2"/>
                            <path d="M15 7h2a5 5 0 0 1 0 10h-2"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                        <span class="lobby-connect__label">Start here</span>
                    </button>
                    <div class="lobby-connect-pop" id="lobby-connect-pop" hidden></div>
                </div>

                <!-- Legacy chips: kept in markup but hidden via CSS so the
                     existing wire-up code in app/shell.js continues to
                     attach event handlers without throwing. The new
                     Connect popover routes user-visible flows through
                     these elements (clicks them programmatically). -->
                <div class="lobby-chip-wrap lobby-chip-wrap--legacy" hidden>
                    <button class="lobby-llm" id="lobby-llm" type="button" data-connected="false" aria-label="Link LLM">
                        <span class="hud-dot hud-dot--idle"></span>
                        <span class="lobby-llm__label">LLM</span>
                    </button>
                    <div class="lobby-chip-pop" id="lobby-llm-pop" hidden></div>
                </div>
                <div class="lobby-link-wrap lobby-chip-wrap--legacy" hidden>
                    <button class="lobby-link" id="lobby-link-llm-steam" type="button" data-state="idle" aria-label="Link LLM and Steam">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="17 1 21 5 17 9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7 23 3 19 7 15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                    </button>
                </div>
                <div class="lobby-chip-wrap lobby-chip-wrap--legacy" hidden>
                    <button class="lobby-steam" id="lobby-steam" type="button" data-linked="false" aria-label="Steam">
                        <svg class="lobby-steam__icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                            <path fill="currentColor" d="M12 2C6.6 2 2.2 6 2 11.1l5.4 2.3c.5-.3 1-.5 1.6-.5h.1l2.4-3.5v-.1a3.6 3.6 0 1 1 3.6 3.6h-.1L11.6 15v.1a2.9 2.9 0 0 1-5.7.6L2 14.1A10 10 0 1 0 12 2zm-4.1 14.8l-1.3-.5a2.3 2.3 0 0 0 2.6 1.3 2.3 2.3 0 0 0 1.4-3l-1.3-.6c.7.3 1 1 .8 1.7-.2.7-1 1.3-1.7 1.3a1.4 1.4 0 0 1-.5 0zm6.2-3.2a2.4 2.4 0 0 1-2.4-2.4 2.4 2.4 0 0 1 2.4-2.4 2.4 2.4 0 0 1 2.4 2.4 2.4 2.4 0 0 1-2.4 2.4zm0-.6a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6z"/>
                        </svg>
                        <img class="lobby-steam__avatar" id="lobby-steam-avatar" alt="" hidden>
                        <span class="lobby-steam__label" id="lobby-steam-label">Steam</span>
                    </button>
                    <div class="lobby-chip-pop" id="lobby-steam-pop" hidden></div>
                </div>
                <div class="lobby-link-wrap lobby-chip-wrap--legacy" hidden>
                    <button class="lobby-link" id="lobby-link" type="button" data-state="idle" aria-label="Link wallet and Steam">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="17 1 21 5 17 9"/>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                            <polyline points="7 23 3 19 7 15"/>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                        </svg>
                    </button>
                    <div class="lobby-link__popover" id="lobby-link-popover" hidden></div>
                </div>
                <!-- Legacy wallet chip — absorbed by the unified Connect
                     button above. Kept in markup (hidden) so existing
                     code in app/shell.js (wallet-changed listener,
                     wallet popover, signature flows) keeps wiring. -->
                <div class="lobby-chip-wrap lobby-chip-wrap--legacy" hidden>
                    <button class="lobby-wallet" id="lobby-wallet" type="button" data-connected="false" aria-label="Wallet">
                        <span class="hud-dot hud-dot--idle"></span>
                        <span>Connect</span>
                    </button>
                    <div class="lobby-chip-pop" id="lobby-wallet-pop" hidden></div>
                </div>
                <button class="mobile-menu-toggle" id="lobby-menu-toggle" type="button"
                        aria-label="Menu" aria-expanded="false" aria-controls="lobby-mobile-nav-panel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6"  x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- Stage -->
        <div class="lobby-stage-wrap">
            <aside class="lobby-wing lobby-wing--left" id="lobby-wing-left" aria-label="Identity"></aside>

            <div class="lobby-stage" id="lobby-stage" data-stage-mode="idle">
                <div class="hud-brackets hud-brackets--dim" aria-hidden="true"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>

                <!-- Legacy ribbon container — kept as an empty stub so older
                     CSS / DOM refs don't 404. The lobby renders ONE subject
                     at a time inside .lobby-stage__solo below. -->
                <div class="lobby-carousel" id="lobby-carousel" role="list" aria-label="Featured DexHeros" hidden></div>

                <!-- Single-subject display (used by both idle + context modes). -->
                <div class="lobby-stage__solo" id="lobby-stage-solo">
                    <div class="lobby-stage__subject" id="lobby-stage-subject" role="img" aria-label="Featured DexHero" data-swapping="true">
                    </div>
                    <!-- Section titles sit above the bubble dock; only
                         visible when the bubble dock is peeked (hovered)
                         or the titles themselves are hovered. Activity
                         absorbs the old Chat Log — same dock surface,
                         chat replies + proactive ticks live together. -->
                    <div class="lobby-stage__bubble-titles" id="lobby-stage-bubble-titles" role="tablist">
                        <button type="button" class="lobby-stage__bubble-title is-active" data-bubble-tab="feed">Feed</button>
                        <button type="button" class="lobby-stage__bubble-title"           data-bubble-tab="todo">To-Do</button>
                        <button type="button" class="lobby-stage__bubble-title"           data-bubble-tab="topics">Topics</button>
                    </div>
                    <!-- Speaking surface: the bubble that's CURRENTLY being
                         spoken lives here, anchored above the model's head bone
                         via --dh-head-anchor-x/y CSS variables published every
                         rAF by app/services/dexhero-body-driver.js. The bubble
                         transitions from this surface to the dock (#lobby-stage-
                         bubble) once typing finishes, via a FLIP-style slide
                         in app/ui/stage-chat.js. -->
                    <div class="lobby-stage__speaking-bubble" id="lobby-stage-speaking-bubble" role="status" aria-live="polite" hidden></div>

                    <!-- Bubble dock: history stack of past replies + user
                         messages. Stays anchored at the right edge of the
                         viewport regardless of where the model is. -->
                    <div class="lobby-stage__bubble" id="lobby-stage-bubble" role="status" aria-live="polite" hidden></div>
                    <!-- Quick-reply bubble: appears to the RIGHT of the main bubble
                         when the model's response contains a question or option
                         list. Each chip is a clickable suggested response that
                         routes through the same chat-send flow as typed input. -->
                    <div class="lobby-stage__quick-reply" id="lobby-stage-quick-reply" role="group" aria-label="Quick reply" hidden></div>
                    <div class="lobby-stage__nameplate" id="lobby-stage-nameplate" aria-live="polite">
                        <span class="lobby-carousel__name" data-name>—</span>
                        <span class="lobby-carousel__stats" data-stats></span>
                        <div class="lobby-stage__dots" id="lobby-stage-dots" aria-hidden="true"></div>
                    </div>
                    <!-- Chat input: user types here to speak to the centered
                         DexHero. Always visible. The "Connect AI Model" CTA
                         lives inside the speech bubble above (so it reads as
                         the model asking the visitor to connect a brain). -->
                    <form class="lobby-stage__chat" id="lobby-stage-chat" autocomplete="off">
                        <!-- Expand toggle — opens / closes the chat log
                             (the right wing's Activity pane). The wing
                             keeps its existing move + 8-way resize behavior
                             once expanded; this button just exposes the
                             toggle right next to the input so the chat bar
                             reads as one surface. aria-expanded mirrors the
                             wing state so screen readers announce it. -->
                        <button type="button" class="lobby-stage__chat-expand" id="lobby-stage-chat-expand"
                                aria-expanded="false" aria-controls="lobby-wing-right"
                                aria-label="Show chat log" title="Show chat log">
                            <svg class="lobby-stage__chat-expand-icon-up" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <polyline points="6 15 12 9 18 15"/>
                            </svg>
                            <svg class="lobby-stage__chat-expand-icon-down" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <input type="text" class="lobby-stage__chat-input" id="lobby-stage-chat-input"
                               placeholder="Speak to your DexHero…" maxlength="500" aria-label="Chat with DexHero">
                        <!-- Voice mute toggle. Default unmuted — first user click
                             on Send also satisfies any autoplay-gesture restriction
                             so the TTS plays freely from there on. -->
                        <button type="button" class="lobby-stage__voice-toggle" id="lobby-stage-voice-toggle"
                                aria-pressed="false" aria-label="Mute voice">
                            <svg class="lobby-stage__voice-icon-on"  width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M11 5 L6 9 H3 v6 h3 l5 4 V5z"/>
                                <path d="M15.5 8.5 a4 4 0 0 1 0 7"/>
                                <path d="M18.5 5.5 a8 8 0 0 1 0 13"/>
                            </svg>
                            <svg class="lobby-stage__voice-icon-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M11 5 L6 9 H3 v6 h3 l5 4 V5z"/>
                                <line x1="22" y1="9" x2="16" y2="15"/>
                                <line x1="16" y1="9" x2="22" y2="15"/>
                            </svg>
                        </button>
                        <button type="submit" class="lobby-stage__chat-send" aria-label="Send">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </form>
                </div>

                <!-- Feed open/close. Two icon states:
                     • collapsed → 3-bar "stream" icon + Feed label so the
                       affordance reads as "open the DNA Feed" instead of
                       a generic arrow.
                     • expanded  → right-chevron so the button reads as
                       "tuck the panel away."
                     CSS swaps icons + label visibility based on
                     [data-wing-collapsed]. -->
                <button class="lobby-stage__nav lobby-stage__nav--next" id="lobby-stage-next" type="button" aria-label="Open Genetics" title="Open Genetics">
                    <svg class="lobby-stage__nav-icon-feed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3"  y="4"  width="18" height="4" rx="1.2"/>
                        <rect x="3"  y="10" width="18" height="4" rx="1.2"/>
                        <rect x="3"  y="16" width="18" height="4" rx="1.2"/>
                    </svg>
                    <svg class="lobby-stage__nav-icon-collapse" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><polyline points="9 6 15 12 9 18"/></svg>
                    <span class="lobby-stage__nav-label">Feed</span>
                </button>

                <div class="lobby-stage__caption" id="lobby-stage-caption" aria-live="polite"></div>
            </div>

            <aside class="lobby-wing lobby-wing--right" id="lobby-wing-right" aria-label="Actions"></aside>
        </div>

        <!-- Chat overlay — floating draggable+resizable container that
             holds the chat log on top and the chat input on the bottom.
             Toggled by #lobby-stage-chat-expand. When opened, the
             original bottom chat form (#lobby-stage-chat) is MOVED into
             [data-chat-overlay-form-mount] below and the original
             bottom slot is hidden via body.is-chat-overlay-open. When
             closed, the form is moved back to its original parent. The
             activity (chat log) lives here permanently — used to live
             in the right wing but moved here so the chat input + its
             history read as one surface. -->
        <aside class="lobby-chat-overlay" id="lobby-chat-overlay" aria-label="Chat" hidden>
            <header class="lobby-chat-overlay__head" data-overlay-drag>
                <span class="lobby-chat-overlay__title">Chat</span>
                <button type="button" class="lobby-chat-overlay__close" id="lobby-chat-overlay-close" aria-label="Close chat">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="6" y1="6" x2="18" y2="18"/>
                        <line x1="18" y1="6" x2="6" y2="18"/>
                    </svg>
                </button>
            </header>
            <div class="lobby-chat-overlay__log activity-panel">
                <div class="chat-log" data-activity>
                    <div class="chat-log__head">
                        <span class="chat-log__head-title">Chat</span>
                        <span class="chat-log__head-sub" data-activity-sub>While you were away</span>
                    </div>
                    <div class="activity__list" data-activity-list></div>
                    <div class="chat-log__empty" data-activity-empty>
                        <div class="chat-log__empty-title">Nothing here yet.</div>
                        <div class="chat-log__empty-sub">Speak to your DexHero below — your conversation appears here as an IDE-style chat. Drag the header to move; pull the edges to resize.</div>
                    </div>
                </div>
            </div>
            <div class="lobby-chat-overlay__form-slot" data-chat-overlay-form-mount>
                <!-- The bottom chat form (#lobby-stage-chat) is DOM-moved
                     into this slot when the overlay opens. -->
            </div>
        </aside>

        <!-- Bottom bar -->
        <div class="lobby-bar" id="lobby-bar" role="contentinfo">
            <span class="lobby-bar__chip" id="lobby-bar-chip">
                <span class="hud-dot hud-dot--live"></span>
                <span>ONLINE</span>
            </span>
            <span class="lobby-bar__stats" id="lobby-bar-stats" aria-live="polite">
                <span class="lobby-bar__stats-dot">●</span>
                <span class="lobby-bar__stat">
                    <span data-stat="players">0</span><span class="lobby-bar__stat-full"> playing now</span><span class="lobby-bar__stat-short"> live</span>
                </span>
                <span class="lobby-bar__stats-sep">·</span>
                <span class="lobby-bar__stat">
                    <span data-stat="servers">0</span><span class="lobby-bar__stat-full"> servers live</span><span class="lobby-bar__stat-short"> srv</span>
                </span>
                <span class="lobby-bar__stats-sep">·</span>
                <span class="lobby-bar__stat">
                    <span data-stat="sessions">0</span><span class="lobby-bar__stat-full"> sessions / 24h</span><span class="lobby-bar__stat-short"> /24h</span>
                </span>
            </span>
            <div class="lobby-bar__cta" id="lobby-bar-cta"></div>
            <div class="lobby-bar__end">
                <button type="button" class="lobby-bar__changes-toggle hide-mobile" id="lobby-changes-toggle"
                        data-state="on" title="Pause all your patches — show the platform default">
                    <span data-label>Changes · ON</span>
                </button>
                <button type="button" class="lobby-bar__changes-toggle hide-mobile" id="lobby-autonomous-toggle"
                        data-state="off" title="Let my dexhero autonomously scan and post upgrades">
                    <span data-label>Auto · OFF</span>
                </button>
                <a href="#/referrals" class="hide-mobile">Referrals</a>
                <a href="#/fees" class="hide-mobile">Fees</a>
                <a href="#/docs">Docs</a>
                <a href="https://x.com/DexHero" target="_blank" rel="noopener">X</a>
            </div>
        </div>

    </div>

    <!-- Panel host (fixed, above the shell) -->
    <div class="lobby-panels" id="lobby-panels" aria-live="polite"></div>

    <!-- Toast host -->
    <div class="lobby-toasts" id="lobby-toasts" aria-live="polite" aria-atomic="false"></div>

    <!-- Modal host — filled by /components/modals.js on DOMContentLoaded. -->
    <div id="modals-placeholder"></div>

    <!-- Shell bootstrap -->
    <script type="module" src="/app/shell.js?v=3"></script>
</body>
